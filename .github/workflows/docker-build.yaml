name: build-and-push

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get upstream version
        id: version
        run: |
          docker pull sorenisanerd/gotty:latest --quiet
          V=$(docker image inspect sorenisanerd/gotty:latest \
            --format '{{index .Config.Labels "org.opencontainers.image.version"}}' \
            2>/dev/null || echo "unknown")
          echo "version=${V}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          pull: true
          tags: |
            mulin/gotty-tmux:latest
            mulin/gotty-tmux:${{ steps.version.outputs.version }}
          cache-from: type=registry,ref=mulin/gotty-tmux:latest
